<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairScale — Agent Trust Directory (Beta)</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face{font-family:'Advercase';src:url('assets/Advercase-Regular.ttf') format('truetype')}
    @font-face{font-family:'Advercase';src:url('assets/Advercase-Bold.ttf') format('truetype');font-weight:700}
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f5f0e8;--surface:#faf7f2;--card:#ffffff;--border:#e8e0d4;--primary:#1a1612;--accent:#3d7a62;--gold:#c8963a;--text:#2c2620;--muted:#8a8078;--dim:#b8b0a4;--red:#c44a3a;--shadow:0 1px 3px rgba(26,22,18,.06),0 4px 12px rgba(26,22,18,.04);--shadow-lg:0 4px 16px rgba(26,22,18,.08),0 12px 32px rgba(26,22,18,.06)}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    /* Gate overlay */
    .gate{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
    .gate.hidden{opacity:0;visibility:hidden;pointer-events:none}

    /* Background pattern */
    .gate-bg{position:absolute;inset:0;overflow:hidden}
    .gate-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbFloat 20s ease-in-out infinite}
    .orb-1{width:500px;height:500px;background:var(--accent);top:-10%;left:-5%;animation-delay:0s}
    .orb-2{width:400px;height:400px;background:var(--gold);bottom:-10%;right:-5%;animation-delay:-7s}
    .orb-3{width:300px;height:300px;background:#7a5aa0;top:50%;left:60%;animation-delay:-14s}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.9)}}

    /* Gate card */
    .gate-card{position:relative;z-index:1;width:440px;max-width:92vw;text-align:center;animation:cardIn .6s cubic-bezier(.16,1,.3,1) both}
    @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    .gate-logo{height:32px;margin-bottom:32px;opacity:.8}
    .gate-title{font-family:'Advercase';font-size:1.8rem;color:var(--primary);line-height:1.2}
    .gate-title span{background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .gate-sub{font-size:.88rem;color:var(--muted);margin-top:8px;line-height:1.55}
    .gate-badge{display:inline-block;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:4px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(61,122,98,.1),rgba(200,150,58,.1));border:1px solid rgba(61,122,98,.2);color:var(--accent);margin-top:16px}

    /* Tabs */
    .gate-tabs{display:flex;gap:0;margin-top:28px;background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
    .gate-tab{flex:1;padding:12px;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;transition:.2s}
    .gate-tab.active{color:var(--accent);background:rgba(61,122,98,.06);font-weight:600}
    .gate-tab:hover:not(.active){color:var(--text);background:rgba(0,0,0,.02)}

    /* Forms */
    .gate-form{margin-top:16px;display:none;animation:fadeUp .3s ease}
    .gate-form.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .gate-input-group{margin-top:12px;text-align:left}
    .gate-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;font-weight:500}
    .gate-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:.88rem;color:var(--text);font-family:inherit;outline:none;transition:.2s}
    .gate-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,122,98,.08)}
    .gate-input::placeholder{color:var(--dim)}
    .gate-input.mono{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;letter-spacing:.05em}

    .gate-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#3d7a62,#4a9878);color:#fff;border:none;border-radius:10px;font-family:'DM Sans';font-size:.88rem;font-weight:600;cursor:pointer;transition:.25s;box-shadow:0 2px 12px rgba(61,122,98,.25)}
    .gate-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(61,122,98,.35)}
    .gate-btn:active{transform:translateY(0)}
    .gate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .gate-msg{margin-top:12px;font-size:.78rem;padding:10px 14px;border-radius:8px;display:none}
    .gate-msg.error{display:block;background:#fae8e8;color:var(--red);border:1px solid #f0d0d0}
    .gate-msg.success{display:block;background:#e8f4ee;color:var(--accent);border:1px solid #c8e8d8}

    .gate-divider{margin-top:20px;font-size:.72rem;color:var(--dim);position:relative}
    .gate-divider::before,.gate-divider::after{content:'';position:absolute;top:50%;width:calc(50% - 40px);height:1px;background:var(--border)}
    .gate-divider::before{left:0}.gate-divider::after{right:0}

    .gate-footer{margin-top:32px;font-size:.72rem;color:var(--dim);line-height:1.6}
    .gate-footer a{color:var(--accent);text-decoration:none}
    .gate-footer a:hover{text-decoration:underline}

    /* Responsive */
    @media(max-width:480px){.gate-title{font-size:1.4rem}.gate-card{padding:0 16px}}
  </style>
</head>
<body>
  <!-- BETA GATE -->
  <div class="gate" id="gate">
    <div class="gate-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="gate-card">
      <img src="assets/logo.png" alt="FairScale" class="gate-logo">
      <div class="gate-title">Agent Trust <span>Directory</span></div>
      <div class="gate-sub">The trust and discovery layer for Solana AI agents. Ranked by on-chain behavior, protocol verification, and reputation.</div>
      <div class="gate-badge">Private Beta</div>

      <div class="gate-tabs">
        <button class="gate-tab active" onclick="switchTab('access')">Enter Access Code</button>
        <button class="gate-tab" onclick="switchTab('login')">Sign In</button>
      </div>

      <!-- Access Code Form -->
      <div class="gate-form active" id="formAccess">
        <div class="gate-input-group">
          <label class="gate-label">Access Code</label>
          <input class="gate-input mono" id="codeInput" type="text" placeholder="Enter your beta access code" autocomplete="off">
        </div>
        <div class="gate-input-group">
          <label class="gate-label">Email Address</label>
          <input class="gate-input" id="emailInput" type="email" placeholder="you@example.com">
        </div>
        <button class="gate-btn" id="codeBtn" onclick="submitCode()">Access Directory</button>
        <div class="gate-msg" id="codeMsg"></div>
      </div>

      <!-- Login Form -->
      <div class="gate-form" id="formLogin">
        <div class="gate-input-group">
          <label class="gate-label">Email Address</label>
          <input class="gate-input" id="loginEmail" type="email" placeholder="you@example.com">
        </div>
        <button class="gate-btn" onclick="submitLogin()">Sign In</button>
        <div class="gate-msg" id="loginMsg"></div>
      </div>

      <div class="gate-footer">
        <a href="https://fairscale.xyz" target="_blank">fairscale.xyz</a> · <a href="https://twitter.com/fairscalexyz" target="_blank">@fairscalexyz</a>
      </div>
    </div>
  </div>

  <!-- MAIN APP (hidden behind gate) -->
  <div id="mainApp" style="display:none">
    <!-- This is where the directory loads -->
  </div>

  <script>
    // =========================================================================
    // BETA GATE LOGIC
    // =========================================================================

    const CODES = {
      'Ch@os123': { type: 'unlimited', maxUses: Infinity },
      'fAIRgent123': { type: 'limited', maxUses: 20 },
    };

    // Storage keys
    const STORAGE_USERS = 'fs_beta_users';      // { email: { code, accessedAt, ... } }
    const STORAGE_CODE_USES = 'fs_beta_codes';   // { code: count }
    const STORAGE_SESSION = 'fs_beta_session';   // current logged-in email

    function getStore(key) {
      try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; }
    }
    function setStore(key, val) {
      localStorage.setItem(key, JSON.stringify(val));
    }

    // Check if already logged in
    function checkSession() {
      const session = localStorage.getItem(STORAGE_SESSION);
      if (session) {
        const users = getStore(STORAGE_USERS);
        if (users[session]) {
          grantAccess();
          return true;
        }
      }
      return false;
    }

    function switchTab(tab) {
      document.querySelectorAll('.gate-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'access' && i === 0) || (tab === 'login' && i === 1));
      });
      document.getElementById('formAccess').classList.toggle('active', tab === 'access');
      document.getElementById('formLogin').classList.toggle('active', tab === 'login');
      clearMessages();
    }

    function clearMessages() {
      ['codeMsg', 'loginMsg'].forEach(id => {
        const el = document.getElementById(id);
        el.className = 'gate-msg'; el.textContent = '';
      });
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'gate-msg ' + type;
    }

    function submitCode() {
      const code = document.getElementById('codeInput').value.trim();
      const email = document.getElementById('emailInput').value.trim().toLowerCase();

      if (!code) return showMsg('codeMsg', 'Please enter an access code.', 'error');
      if (!email || !email.includes('@')) return showMsg('codeMsg', 'Please enter a valid email address.', 'error');

      // Check code validity
      const codeDef = CODES[code];
      if (!codeDef) return showMsg('codeMsg', 'Invalid access code. Please check and try again.', 'error');

      // Check usage limit
      const codeUses = getStore(STORAGE_CODE_USES);
      const currentUses = codeUses[code] || 0;
      if (codeDef.type === 'limited' && currentUses >= codeDef.maxUses) {
        return showMsg('codeMsg', 'This access code has reached its usage limit.', 'error');
      }

      // Check if email already registered with a different code
      const users = getStore(STORAGE_USERS);
      if (users[email] && users[email].code !== code) {
        // Allow — they're using a different valid code, update it
      }

      // Register user
      users[email] = { code, accessedAt: new Date().toISOString(), uses: (users[email]?.uses || 0) + 1 };
      setStore(STORAGE_USERS, users);

      // Increment code usage (only if not unlimited)
      if (codeDef.type === 'limited') {
        codeUses[code] = currentUses + 1;
        setStore(STORAGE_CODE_USES, codeUses);
      }

      // Set session
      localStorage.setItem(STORAGE_SESSION, email);

      showMsg('codeMsg', 'Access granted. Loading directory...', 'success');
      setTimeout(grantAccess, 800);
    }

    function submitLogin() {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      if (!email || !email.includes('@')) return showMsg('loginMsg', 'Please enter a valid email address.', 'error');

      const users = getStore(STORAGE_USERS);
      if (!users[email]) return showMsg('loginMsg', 'No account found with this email. Please use an access code first.', 'error');

      localStorage.setItem(STORAGE_SESSION, email);
      showMsg('loginMsg', 'Welcome back. Loading directory...', 'success');
      setTimeout(grantAccess, 800);
    }

    function grantAccess() {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('mainApp').style.display = 'block';
      loadDirectory();
    }

    function loadDirectory() {
      // Load the actual directory app into mainApp
      const app = document.getElementById('mainApp');
      const iframe = document.createElement('iframe');
      iframe.src = 'directory.html';
      iframe.style.cssText = 'width:100%;height:100vh;border:none;display:block';
      app.appendChild(iframe);
    }

    // Enter key handlers
    document.getElementById('codeInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('emailInput').focus(); });
    document.getElementById('emailInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') submitCode(); });
    document.getElementById('loginEmail')?.addEventListener('keypress', e => { if (e.key === 'Enter') submitLogin(); });

    // Auto-check session on load
    if (!checkSession()) {
      document.getElementById('gate').style.display = 'flex';
    }
  </script>
</body>
</html>
