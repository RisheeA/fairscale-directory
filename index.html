<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairScale — Agent Trust Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'Advercase'; src: url('assets/Advercase-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Advercase'; src: url('assets/Advercase-Bold.ttf') format('truetype'); font-weight: 700; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080a0e; --surface: #111318; --card: #181b22; --border: #262a35;
      --primary: #f0dcc8; --accent: #5aad8e; --gold: #e0b85c;
      --text: #ededf0; --muted: #8a8a96; --dim: #52525e;
      --green: #5aad8e; --blue: #7088e8; --purple: #ab7ed0;
      --yellow: #e0b85c; --red: #d4493a; --orange: #d48a42;
      --vgreen: #3ab858; --pink: #db7a90;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: url('assets/background.png') center/cover no-repeat; opacity: 0.04; z-index: -1; pointer-events: none; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px; border-bottom: 1px solid var(--border); background: rgba(6,6,8,0.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 80; }
    .header img { height: 26px; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .header nav a { color: var(--muted); text-decoration: none; font-size: 0.78rem; padding: 6px 12px; border-radius: 6px; transition: 0.15s; }
    .header nav a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .lookup-btn { background: var(--accent); color: #fff; border: none; font-family: 'DM Sans'; font-size: 0.78rem; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: 0.15s; }
    .lookup-btn:hover { opacity: 0.88; }
    .main { display: flex; height: calc(100vh - 53px); }
    .directory-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .hero-bar { padding: 24px 28px 0; }
    .hero-title { font-family: 'Advercase'; font-size: 1.5rem; color: var(--primary); }
    .hero-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .hero-stats { display: flex; gap: 20px; margin-top: 14px; }
    .hero-stat { font-size: 0.72rem; color: var(--dim); }
    .hero-stat strong { color: var(--text); font-weight: 600; }
    .filter-bar { display: flex; gap: 8px; padding: 16px 28px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
    .filter-bar input { flex: 2; min-width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 0.82rem; color: var(--text); font-family: inherit; outline: none; transition: 0.15s; }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar input::placeholder { color: var(--dim); }
    .filter-bar select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 0.78rem; color: var(--text); font-family: inherit; cursor: pointer; outline: none; min-width: 110px; }
    .filter-bar select option { background: var(--card); }
    .agent-count { font-size: 0.75rem; color: var(--muted); margin-left: auto; white-space: nowrap; }
    .dir-scroll { flex: 1; overflow-y: auto; padding: 0 28px 16px; }
    .dir-scroll::-webkit-scrollbar { width: 4px; }
    .dir-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }
    .agent-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; margin-top: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
    .agent-row:hover { border-color: #2a2b32; background: #16171e; transform: translateX(2px); }
    .agent-row.active { border-color: var(--accent); background: rgba(74,144,121,0.06); }
    .agent-rank { font-family: 'Advercase'; color: var(--dim); width: 24px; font-size: 0.82rem; text-align: center; flex-shrink: 0; }
    .agent-rank.top1 { color: var(--gold); } .agent-rank.top2 { color: #b0b0b0; } .agent-rank.top3 { color: #cd7f32; }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-weight: 600; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-wallet { font-family: monospace; font-size: 0.58rem; color: var(--dim); margin-top: 2px; }
    .agent-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
    .atag { font-size: 0.52rem; padding: 2px 7px; border-radius: 4px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
    .atag.said { background: rgba(74,144,121,0.18); color: var(--accent); }
    .atag.erc8004 { background: rgba(100,120,220,0.18); color: #8090dd; }
    .atag.fs { background: rgba(232,212,196,0.12); color: var(--primary); }
    .atag.clawkey { background: rgba(212,168,83,0.18); color: var(--gold); }
    .atag.rec { border-radius: 10px; padding: 2px 9px; font-size: 0.5rem; }
    .atag.rec-gold { background: rgba(212,168,83,0.15); color: var(--gold); }
    .atag.rec-green { background: rgba(74,144,121,0.15); color: var(--accent); }
    .atag.rec-yellow { background: rgba(201,168,50,0.12); color: var(--yellow); }
    .atag.rec-orange { background: rgba(201,120,50,0.12); color: var(--orange); }
    .atag.rec-red { background: rgba(201,66,50,0.12); color: var(--red); }
    .agent-bars { display: flex; gap: 2px; align-items: flex-end; height: 22px; flex-shrink: 0; }
    .agent-bars .mini-bar { width: 5px; border-radius: 2px 2px 0 0; transition: 0.2s; }
    .agent-score { font-family: 'Advercase'; font-size: 1.5rem; font-weight: 700; color: var(--primary); flex-shrink: 0; min-width: 40px; text-align: right; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 14px; }
    .pg-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: 0.15s; }
    .pg-btn:hover:not(:disabled) { border-color: var(--dim); color: var(--text); }
    .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pg-info { font-size: 0.75rem; color: var(--dim); }
    .empty { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 0.85rem; }
    .profile-panel { width: 0; overflow: hidden; background: var(--surface); border-left: 1px solid var(--border); transition: width 0.3s ease; flex-shrink: 0; display: flex; flex-direction: column; }
    .profile-panel.open { width: 520px; }
    .profile-scroll { flex: 1; overflow-y: auto; }
    .profile-scroll::-webkit-scrollbar { width: 4px; }
    .profile-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }
    .profile-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 5; }
    .profile-close { background: none; border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: 0.15s; flex-shrink: 0; }
    .profile-close:hover { color: var(--text); border-color: var(--dim); }
    .profile-name { font-family: 'Advercase'; font-size: 1.15rem; color: var(--primary); }
    .profile-wallet { font-family: monospace; font-size: 0.6rem; color: var(--dim); margin-top: 3px; cursor: pointer; }
    .profile-wallet:hover { color: var(--muted); }
    .profile-desc { font-size: 0.78rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .profile-tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .score-section { padding: 20px 24px; background: linear-gradient(135deg, #0d1a1f, #111318); border-bottom: 1px solid var(--border); text-align: center; }
    .score-big { font-family: 'Advercase'; font-size: 3.2rem; font-weight: 700; color: var(--primary); line-height: 1; }
    .score-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    .score-badges { display: flex; justify-content: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .sbadge { font-size: 0.65rem; padding: 3px 12px; border-radius: 12px; font-weight: 500; }
    .sbadge.tier-gold { background: var(--gold); color: #000; } .sbadge.tier-silver { background: #606068; color: #fff; } .sbadge.tier-bronze { background: #6b5010; color: #e8d4c4; }
    .sbadge.rec { border: 1px solid; }
    .sbadge.rec-gold { border-color: var(--gold); color: var(--gold); background: rgba(212,168,83,0.1); }
    .sbadge.rec-green { border-color: var(--accent); color: var(--accent); background: rgba(74,144,121,0.1); }
    .sbadge.rec-yellow { border-color: var(--yellow); color: var(--yellow); background: rgba(201,168,50,0.08); }
    .sbadge.rec-orange { border-color: var(--orange); color: var(--orange); background: rgba(201,120,50,0.08); }
    .sbadge.rec-red { border-color: var(--red); color: var(--red); background: rgba(201,66,50,0.08); }
    .sbadge.pct { background: rgba(74,144,121,0.1); border: 1px solid rgba(74,144,121,0.25); color: var(--accent); }
    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 14px 24px; border-bottom: 1px solid var(--border); }
    .info-cell { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
    .info-cell .ik { font-size: 0.5rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em; }
    .info-cell .iv { font-family: 'Advercase'; font-size: 0.95rem; color: var(--text); margin-top: 3px; }
    .info-cell.hl { border: 1px solid rgba(74,144,121,0.3); background: rgba(74,144,121,0.06); }
    .info-cell.hl .iv { color: var(--accent); }
    .psection { padding: 16px 24px; border-bottom: 1px solid var(--border); }
    .psection-title { font-family: 'Advercase'; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .flags-bar { display: flex; flex-wrap: wrap; gap: 5px; }
    .flag { font-size: 0.65rem; padding: 3px 10px; border-radius: 8px; background: rgba(201,66,50,0.1); border: 1px solid rgba(201,66,50,0.2); color: var(--red); text-transform: capitalize; }
    .v-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .vpill { font-size: 0.65rem; padding: 4px 10px; border-radius: 8px; font-weight: 500; }
    .vpill.on { background: rgba(46,160,67,0.12); border: 1px solid rgba(46,160,67,0.25); color: #56d364; }
    .vpill.off { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: var(--dim); text-decoration: line-through; }
    .pillar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pillar { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .pillar.inactive { opacity: 0.4; }
    .pillar-top { display: flex; justify-content: space-between; align-items: center; }
    .pillar .plbl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; }
    .pillar .pweight { font-size: 0.55rem; color: var(--dim); }
    .pillar .pval { font-family: 'Advercase'; font-size: 1.2rem; font-weight: 700; }
    .pillar .ppct { font-size: 0.55rem; color: var(--accent); margin-left: 4px; }
    .pillar-bar { height: 3px; background: var(--border); border-radius: 2px; margin: 6px 0 4px; overflow: hidden; }
    .pillar-bar-fill { height: 100%; border-radius: 2px; }
    .pillar-desc { font-size: 0.62rem; color: var(--dim); line-height: 1.4; }
    .pb-reliability { background: linear-gradient(90deg, #4a9079, #6ab899); }
    .pb-track_record { background: linear-gradient(90deg, #6478dc, #8090dd); }
    .pb-economic_stake { background: linear-gradient(90deg, #d4a853, #e8c870); }
    .pb-ecosystem { background: linear-gradient(90deg, #9b6abc, #b88ad4); }
    .pb-verification { background: linear-gradient(90deg, #2ea043, #56d364); }
    .pb-social { background: linear-gradient(90deg, #cf6679, #e8889a); }
    .badge-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .fbadge { font-size: 0.65rem; padding: 3px 10px; border-radius: 8px; background: rgba(212,168,83,0.1); border: 1px solid rgba(212,168,83,0.18); color: var(--gold); }
    .social-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .slink { font-size: 0.7rem; padding: 4px 12px; border-radius: 8px; text-decoration: none; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); transition: 0.15s; }
    .slink:hover { background: rgba(255,255,255,0.06); border-color: var(--dim); }
    .slink.tw { color: #1DA1F2; border-color: rgba(29,161,242,0.2); }
    .profile-actions { padding: 16px 24px; display: flex; gap: 8px; }
    .pact-btn { flex: 1; padding: 10px; border-radius: 8px; font-family: 'DM Sans'; font-size: 0.78rem; font-weight: 500; cursor: pointer; text-align: center; transition: 0.15s; text-decoration: none; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--card); color: var(--text); }
    .pact-btn:hover { border-color: var(--dim); }
    .pact-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 440px; max-width: 92vw; }
    .modal-box h3 { font-family: 'Advercase'; color: var(--primary); font-size: 1rem; margin-bottom: 6px; }
    .modal-box p { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    .modal-input-row { display: flex; gap: 8px; }
    .modal-input-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 0.85rem; color: var(--text); font-family: monospace; outline: none; }
    .modal-input-row input:focus { border-color: var(--accent); }
    .modal-input-row input::placeholder { color: var(--dim); font-family: 'DM Sans'; }
    .modal-input-row button { background: var(--accent); border: none; color: #fff; padding: 0 20px; border-radius: 8px; font-family: 'DM Sans'; font-weight: 500; font-size: 0.82rem; cursor: pointer; }
    .modal-error { font-size: 0.78rem; color: var(--red); margin-top: 8px; display: none; }
    .modal-error.show { display: block; }
    .modal-loading { display: none; align-items: center; gap: 8px; margin-top: 10px; color: var(--muted); font-size: 0.8rem; }
    .modal-loading.show { display: flex; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 900px) {
      .profile-panel.open { width: 100%; position: fixed; inset: 0; top: 53px; z-index: 90; }
    }
    @media (max-width: 600px) {
      .hero-bar { padding: 18px 18px 0; }
      .filter-bar { padding: 12px 18px; }
      .dir-scroll { padding: 0 18px 16px; }
      .info-grid { grid-template-columns: repeat(2, 1fr); }
      .pillar-grid { grid-template-columns: 1fr; }
      .agent-bars { display: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/"><img src="assets/logo.png" alt="FairScale"></a>
    <div class="header-right">
      <nav>
        <a href="https://fairscale.xyz" target="_blank">Website</a>
        <a href="https://docs.fairscale.xyz" target="_blank">Docs</a>
        <a href="https://twitter.com/fairscalexyz" target="_blank">Twitter</a>
      </nav>
    </div>
  </header>
  <div class="main">
    <div class="directory-panel">
      <div class="hero-bar">
        <div class="hero-title">Agent Trust Directory</div>
        <div class="hero-sub">Ranked by on-chain behavior, verification status, and social reputation.</div>
        <div class="hero-stats" id="heroStats"></div>
        <button class="lookup-btn" id="openLookup" style="margin-top:14px;padding:10px 24px;font-size:0.85rem;">🔍 Look up any Solana wallet</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="dirSearch" placeholder="Search by name or wallet...">
        <select id="dirSource"><option value="">All Sources</option><option value="said">SAID Protocol</option><option value="8004">ERC-8004</option><option value="both">Both Protocols</option></select>
        <select id="dirSort"><option value="agent_fairscore">FairScore</option><option value="verification">Verification</option><option value="reliability">Reliability</option><option value="social">Social</option><option value="track_record">Track Record</option><option value="economic_stake">Economic Stake</option><option value="ecosystem">Ecosystem</option></select>
        <select id="dirRec"><option value="">All Tiers</option><option value="highly_recommended">Highly Recommended</option><option value="recommended">Recommended</option><option value="acceptable">Acceptable</option><option value="caution">Caution</option></select>
        <span class="agent-count" id="dirCount">—</span>
      </div>
      <div class="dir-scroll" id="dirScroll"><div class="empty">Loading directory...</div></div>
      <div class="pagination" id="dirPagination"></div>
    </div>
    <div class="profile-panel" id="profilePanel">
      <div class="profile-scroll" id="profileContent"><div class="empty">Select an agent to view their trust profile</div></div>
    </div>
  </div>
  <div class="modal-overlay" id="lookupModal">
    <div class="modal-box">
      <h3>Check Any Wallet</h3>
      <p>Enter a Solana wallet address to see its trust score and breakdown.</p>
      <div class="modal-input-row"><input type="text" id="lookupInput" placeholder="Wallet address..."><button id="lookupBtn">Score</button></div>
      <div class="modal-error" id="lookupError"></div>
      <div class="modal-loading" id="lookupLoading"><div class="spinner"></div><span>Scoring wallet...</span></div>
    </div>
  </div>
  <script>
    const API = 'https://fairscale-reputation-api-production.up.railway.app';
    let dirPage = 1, activeWallet = null;

    document.getElementById('openLookup').onclick = () => document.getElementById('lookupModal').classList.add('show');
    document.getElementById('lookupModal').onclick = e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('show'); };
    document.getElementById('lookupBtn').onclick = doLookup;
    document.getElementById('lookupInput').onkeypress = e => e.key === 'Enter' && doLookup();

    async function doLookup() {
      const w = document.getElementById('lookupInput').value.trim();
      const err = document.getElementById('lookupError');
      const ld = document.getElementById('lookupLoading');
      err.classList.remove('show'); ld.classList.remove('show');
      if (!w || w.length < 32) { err.textContent = 'Enter a valid Solana wallet address'; err.classList.add('show'); return; }
      ld.classList.add('show');
      try {
        const r = await fetch(`${API}/score?wallet=${encodeURIComponent(w)}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        document.getElementById('lookupModal').classList.remove('show');
        ld.classList.remove('show');
        renderProfile(d);
        document.getElementById('profilePanel').classList.add('open');
        activeWallet = w;
        document.querySelectorAll('.agent-row').forEach(el => el.classList.toggle('active', el.dataset.wallet === w));
      } catch (e) { err.textContent = e.message; err.classList.add('show'); ld.classList.remove('show'); }
    }

    let debounce = null;
    ['dirSearch','dirSource','dirSort','dirRec'].forEach(id => {
      const el = document.getElementById(id);
      el[id === 'dirSearch' ? 'oninput' : 'onchange'] = () => { dirPage = 1; clearTimeout(debounce); debounce = setTimeout(loadDir, 250); };
    });

    async function loadDir() {
      const search = document.getElementById('dirSearch').value.trim();
      const source = document.getElementById('dirSource').value;
      const sort = document.getElementById('dirSort').value;
      const rec = document.getElementById('dirRec').value;
      const params = new URLSearchParams({ page: dirPage, limit: 25, sort });
      if (search) params.set('search', search);
      if (source) params.set('source', source);
      if (rec) params.set('recommendation', rec);
      const scroll = document.getElementById('dirScroll');
      try {
        const r = await fetch(`${API}/directory?${params}`);
        const d = await r.json();
        const agents = d.agents || [];
        document.getElementById('dirCount').textContent = `${d.total} agents`;
        if (agents.length) {
          scroll.innerHTML = agents.map(a => {
            const rc = a.recommendation?.color || '';
            const rl = a.recommendation?.label || '';
            const tags = [
              ...(a.sources || []).map(s => s === 'said' ? '<span class="atag said">SAID</span>' : s === 'erc8004' ? '<span class="atag erc8004">8004</span>' : s === 'fairscale' ? '<span class="atag fs">FS</span>' : ''),
              a.humanVerified ? '<span class="atag clawkey">ClawKey ✓</span>' : '',
              rl ? `<span class="atag rec rec-${rc}">${rl}</span>` : '',
            ].filter(Boolean).join('');
            const f = a.features || {};
            const bars = [
              { v: f.verification||0, c: '#56d364' }, { v: f.reliability||0, c: '#6ab899' },
              { v: f.social||0, c: '#e8889a' }, { v: f.track_record||0, c: '#8090dd' },
              { v: f.economic_stake||0, c: '#e8c870' }, { v: f.ecosystem||0, c: '#b88ad4' },
            ].map(b => `<div class="mini-bar" style="height:${Math.max(b.v*0.22,2)}px;background:${b.c};"></div>`).join('');
            const sub = sort !== 'agent_fairscore' ? `<div style="font-size:0.55rem;color:var(--dim);text-align:right;">${sort.replace(/_/g,' ')}: ${f[sort]||'—'}</div>` : '';
            return `<div class="agent-row${a.wallet===activeWallet?' active':''}" data-wallet="${a.wallet}" onclick="selectAgent('${a.wallet}')">
              <div class="agent-rank${a.rank<=3?' top'+a.rank:''}">${a.rank}</div>
              <div class="agent-info"><div class="agent-name">${a.name}</div><div class="agent-wallet">${a.wallet.slice(0,6)}...${a.wallet.slice(-4)}</div><div class="agent-tags">${tags}</div></div>
              <div class="agent-bars">${bars}</div>
              <div style="text-align:right;">${sub}<div class="agent-score">${a.agent_fairscore}</div></div>
            </div>`;
          }).join('');
        } else scroll.innerHTML = '<div class="empty">No agents match your filters</div>';
        const pag = document.getElementById('dirPagination');
        if (d.totalPages > 1) pag.innerHTML = `<button class="pg-btn" ${dirPage<=1?'disabled':''} onclick="dirPage--;loadDir()">← Prev</button><span class="pg-info">Page ${dirPage} of ${d.totalPages}</span><button class="pg-btn" ${dirPage>=d.totalPages?'disabled':''} onclick="dirPage++;loadDir()">Next →</button>`;
        else pag.innerHTML = '';
      } catch (e) { scroll.innerHTML = '<div class="empty">Failed to load directory</div>'; }
    }

    async function loadStats() {
      try {
        const r = await fetch(`${API}/stats`);
        const d = await r.json();
        document.getElementById('heroStats').innerHTML = `<div class="hero-stat"><strong>${d.agents||0}</strong> scored</div><div class="hero-stat"><strong>${d.erc8004Agents||0}</strong> ERC-8004</div><div class="hero-stat"><strong>${d.saidAgents||0}</strong> SAID</div><div class="hero-stat"><strong>${d.onBothProtocols||0}</strong> dual</div>`;
      } catch(e) {}
    }

    async function selectAgent(wallet) {
      activeWallet = wallet;
      document.querySelectorAll('.agent-row').forEach(el => el.classList.toggle('active', el.dataset.wallet === wallet));
      const panel = document.getElementById('profilePanel');
      const content = document.getElementById('profileContent');
      panel.classList.add('open');
      content.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
      try {
        const r = await fetch(`${API}/score?wallet=${encodeURIComponent(wallet)}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        renderProfile(d);
      } catch (e) { content.innerHTML = `<div class="empty">${e.message}</div>`; }
    }

    function renderProfile(d) {
      const s = d.agent_fairscore || 0;
      const tier = s >= 70 ? 'gold' : s >= 40 ? 'silver' : 'bronze';
      const f = d.features || {}, desc = d.descriptions || {}, rec = d.recommendation;
      const bd = d.breakdown || {}, pct = d.percentiles || {}, flags = d.red_flags || [];
      const v = d.verifications || {}, socials = d.socials || {};
      const stags = [
        v.said_onchain||d.isSaidAgent ? '<span class="atag said">SAID</span>' : '',
        v.erc8004 ? '<span class="atag erc8004">ERC-8004</span>' : '',
        v.sati ? '<span class="atag erc8004">SATI</span>' : '',
        d.isRegistered ? '<span class="atag fs">FS</span>' : '',
        v.clawkey?.verified ? '<span class="atag clawkey">ClawKey ✓</span>' : '',
      ].filter(Boolean).join('');
      const vPills = [
        { label: 'SAID Protocol', on: v.said_onchain||d.isSaidAgent },
        { label: 'ERC-8004', on: v.erc8004 },
        { label: 'SATI', on: v.sati },
        { label: 'ClawKey Human', on: v.clawkey?.verified },
        { label: 'Payment Verified', on: d.isVerified },
        { label: 'Self-Registered', on: d.isRegistered },
      ].map(p => `<span class="vpill ${p.on?'on':'off'}">${p.on?'✓ ':''}${p.label}</span>`).join('');
      const pillars = [
        { key:'verification', label:'Verification', dw:25, color:'verification' },
        { key:'reliability', label:'Reliability', dw:25, color:'reliability' },
        { key:'social', label:'Social & Rep', dw:15, color:'social' },
        { key:'track_record', label:'Track Record', dw:15, color:'track_record' },
        { key:'economic_stake', label:'Eco. Stake', dw:10, color:'economic_stake' },
        { key:'ecosystem', label:'Ecosystem', dw:10, color:'ecosystem' },
      ].map(p => {
        const w = bd.weights_used ? Math.round((bd.weights_used[p.key]||0)*100) : p.dw;
        const inactive = w === 0, val = f[p.key]||0;
        return `<div class="pillar${inactive?' inactive':''}"><div class="pillar-top"><div><span class="plbl">${p.label}</span> <span class="pweight">${w}%</span></div><div><span class="pval">${val}</span>${pct[p.key]!=null?`<span class="ppct">top ${100-pct[p.key]}%</span>`:''}</div></div><div class="pillar-bar"><div class="pillar-bar-fill pb-${p.color}" style="width:${inactive?0:val}%"></div></div><div class="pillar-desc">${inactive?'No data — weight redistributed':(desc[p.key]||'')}</div></div>`;
      }).join('');
      const socialLinks = [
        socials.twitter ? `<a class="slink tw" href="https://x.com/${socials.twitter.replace('@','')}" target="_blank">𝕏 ${socials.twitter}</a>` : '',
        socials.github ? `<a class="slink" href="https://github.com/${socials.github}" target="_blank">GitHub</a>` : '',
        socials.telegram ? `<a class="slink" href="https://t.me/${socials.telegram}" target="_blank">Telegram</a>` : '',
        socials.discord ? `<span class="slink">Discord: ${socials.discord}</span>` : '',
      ].filter(Boolean).join('');
      document.getElementById('profileContent').innerHTML = `
        <div class="profile-header"><div><div class="profile-name">${d.name||'Agent '+d.wallet.slice(0,8)+'...'}</div><div class="profile-wallet" onclick="navigator.clipboard.writeText('${d.wallet}')" title="Click to copy">${d.wallet}</div>${d.description?`<div class="profile-desc">${d.description}</div>`:''}<div class="profile-tags">${stags}</div></div><button class="profile-close" onclick="document.getElementById('profilePanel').classList.remove('open');activeWallet=null;document.querySelectorAll('.agent-row').forEach(e=>e.classList.remove('active'));">✕</button></div>
        <div class="score-section"><div class="score-big">${s}</div><div class="score-label">Agent FairScore</div><div class="score-badges"><span class="sbadge tier-${tier}">${tier}</span>${rec?`<span class="sbadge rec rec-${rec.color}">${rec.label}</span>`:''}${pct.agent_fairscore!=null?`<span class="sbadge pct">Top ${100-pct.agent_fairscore}%</span>`:''}</div></div>
        <div class="info-grid"><div class="info-cell hl"><div class="ik">FairScale Base</div><div class="iv">${d.fairscore_base||bd.fs_base_raw||'—'}</div></div><div class="info-cell"><div class="ik">Social Score</div><div class="iv">${d.social_score||bd.fs_social_raw||'—'}</div></div><div class="info-cell"><div class="ik">SAID Score</div><div class="iv">${d.said?.score??'—'}</div></div><div class="info-cell"><div class="ik">Attestations</div><div class="iv">${d.said?.feedbackCount||0}</div></div></div>
        ${flags.length?`<div class="psection"><div class="psection-title">⚠ Flags (${bd.red_flag_penalty || 0} point penalty)</div><div class="flags-bar">${flags.map(fl=>`<span class="flag">${fl.replace(/_/g,' ')}</span>`).join('')}</div></div>`:''}
        ${bd.time_decay&&bd.time_decay<1?`<div class="psection" style="padding:10px 24px;"><span style="font-size:0.7rem;color:var(--dim);">Time decay: ${Math.round(bd.time_decay*100)}%</span></div>`:''}
        <div class="psection"><div class="psection-title">Verification Status</div><div class="v-pills">${vPills}</div></div>
        <div class="psection"><div class="psection-title">Trust Pillars</div><div class="pillar-grid">${pillars}</div></div>
        ${socialLinks?`<div class="psection"><div class="psection-title">Linked Socials</div><div class="social-row">${socialLinks}</div></div>`:''}
        ${d.attestation_graph?.attester_count > 0 ? `<div class="psection"><div class="psection-title">Attestation Network</div><div style="display:flex;gap:16px;flex-wrap:wrap;"><div class="info-cell" style="flex:1;min-width:80px;"><div class="ik">Attesters</div><div class="iv">${d.attestation_graph.attester_count}</div></div><div class="info-cell" style="flex:1;min-width:80px;"><div class="ik">Weighted Score</div><div class="iv">${d.attestation_graph.weighted_score}</div></div>${d.attestation_graph.highest_attester?`<div class="info-cell" style="flex:1;min-width:80px;"><div class="ik">Top Attester</div><div class="iv">${d.attestation_graph.highest_attester}</div></div>`:''}</div></div>` : ''}
        ${d.score_trend?.snapshots > 1 ? `<div class="psection"><div class="psection-title">Score Trend</div><div style="display:flex;gap:12px;align-items:center;"><span style="font-size:1.2rem;">${d.score_trend.trend==='rising'?'📈':d.score_trend.trend==='falling'?'📉':'➡️'}</span><span style="font-size:0.78rem;color:var(--text);">${d.score_trend.trend.charAt(0).toUpperCase()+d.score_trend.trend.slice(1)}</span><span style="font-size:0.7rem;color:${d.score_trend.change>=0?'var(--accent)':'var(--red)'};">${d.score_trend.change>=0?'+':''}${d.score_trend.change} last change</span><span style="font-size:0.65rem;color:var(--dim);">${d.score_trend.snapshots} snapshots</span></div></div>` : ''}        <div class="profile-actions"><a class="pact-btn" href="https://solscan.io/account/${d.wallet}" target="_blank">Solscan</a>${d.website?`<a class="pact-btn" href="${d.website}" target="_blank">Website</a>`:''}${!d.isVerified?`<button class="pact-btn primary" onclick="alert('Payment verification coming soon')">Verify ($5)</button>`:''}</div>`;
    }

    loadDir();
    loadStats();
  </script>
</body>
</html>
