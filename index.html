<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairScale Agent Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Advercase';
      src: url('assets/Advercase-Regular.ttf') format('truetype');
      font-weight: 400;
    }

    @font-face {
      font-family: 'Advercase';
      src: url('assets/Advercase-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --bg-card-hover: #161616;
      --border: #1a1a1a;
      --border-hover: #252525;
      --primary: #e8d4c4;
      --secondary: #263b4e;
      --text: #ffffff;
      --text-muted: #888888;
      --text-dim: #555555;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .logo {
      height: 48px;
      margin-bottom: 16px;
    }

    .tagline {
      font-family: 'Advercase', serif;
      color: var(--primary);
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    /* Register Section */
    .register-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 48px;
    }

    .section-title {
      font-family: 'Advercase', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--primary);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    .input-group input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 1rem;
      color: var(--text);
      font-family: 'Inter', monospace;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .input-group input::placeholder {
      color: var(--text-dim);
    }

    .btn {
      background: var(--primary);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 16px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Advercase', serif;
      letter-spacing: 0.02em;
    }

    .btn:hover {
      background: #f5e6da;
    }

    .btn:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--secondary);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #324d63;
    }

    /* Result Card */
    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-top: 24px;
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .result-name {
      font-family: 'Advercase', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--primary);
    }

    .result-wallet {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .agent-score {
      text-align: right;
    }

    .agent-score .score {
      font-family: 'Advercase', serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }

    .agent-score .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Badges */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .badge {
      background: var(--secondary);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--text);
    }

    .badge.said_verified,
    .badge.said_trusted {
      background: var(--primary);
      color: var(--bg);
    }

    /* Trust Scores */
    .trust-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .trust-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .trust-item .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .trust-item .value {
      font-family: 'Advercase', serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .trust-item .value.high { color: var(--primary); }
    .trust-item .value.medium { color: #c4a882; }
    .trust-item .value.low { color: #a86c5a; }

    /* Features */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .feature-item {
      text-align: center;
      padding: 16px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .feature-item .value {
      font-family: 'Advercase', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
    }

    .feature-item .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    /* Directory Section */
    .directory-section {
      margin-top: 60px;
    }

    .directory-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .agent-count {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .directory-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .directory-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .directory-item:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .directory-item .info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .directory-item .rank {
      font-family: 'Advercase', serif;
      font-size: 1.25rem;
      color: var(--text-dim);
      width: 32px;
    }

    .directory-item .name {
      font-family: 'Advercase', serif;
      font-weight: 400;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .directory-item .wallet {
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .directory-item .score {
      font-family: 'Advercase', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary);
    }

    .directory-item .badges-mini {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .badge-mini {
      background: var(--secondary);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .badge-mini.verified {
      background: var(--primary);
      color: var(--bg);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      opacity: 0.3;
    }

    /* Error State */
    .error {
      background: #1a0a0a;
      border: 1px solid #4a2020;
      border-radius: 10px;
      padding: 16px;
      color: #c87070;
      margin-top: 16px;
      display: none;
    }

    .error.show {
      display: block;
    }

    /* Loading */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-muted);
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      margin-top: 80px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .input-group {
        flex-direction: column;
      }

      .trust-grid {
        grid-template-columns: 1fr;
      }

      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .directory-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .directory-item .score {
        align-self: flex-end;
      }

      .result-header {
        flex-direction: column;
        gap: 20px;
      }

      .agent-score {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <img src="assets/logo.png" alt="FairScale" class="logo">
      <p class="tagline">Agent Reputation Directory</p>
    </header>

    <!-- Register Section -->
    <section class="register-section">
      <h2 class="section-title">Check Agent Reputation</h2>
      <div class="input-group">
        <input 
          type="text" 
          id="walletInput" 
          placeholder="Paste Solana wallet address..."
          autocomplete="off"
        >
        <button class="btn" id="registerBtn" onclick="registerAgent()">
          Check
        </button>
      </div>

      <div class="error" id="errorMsg"></div>
      
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Fetching reputation...</span>
      </div>

      <!-- Result Card -->
      <div class="result-card" id="resultCard">
        <div class="result-header">
          <div>
            <div class="result-name" id="resultName">Agent Name</div>
            <div class="result-wallet" id="resultWallet">wallet...</div>
          </div>
          <div class="agent-score">
            <div class="score" id="resultScore">0</div>
            <div class="label">Agent Score</div>
          </div>
        </div>

        <div class="badges" id="resultBadges"></div>

        <div class="trust-grid">
          <div class="trust-item">
            <div class="label">Lending Trust</div>
            <div class="value" id="trustLending">0</div>
          </div>
          <div class="trust-item">
            <div class="label">OTC Trust</div>
            <div class="value" id="trustOtc">0</div>
          </div>
        </div>

        <div class="features-grid">
          <div class="feature-item">
            <div class="value" id="featLongevity">0</div>
            <div class="label">Longevity</div>
          </div>
          <div class="feature-item">
            <div class="value" id="featExperience">0</div>
            <div class="label">Experience</div>
          </div>
          <div class="feature-item">
            <div class="value" id="featConviction">0</div>
            <div class="label">Conviction</div>
          </div>
          <div class="feature-item">
            <div class="value" id="featCapital">0</div>
            <div class="label">Capital</div>
          </div>
        </div>

        <button class="btn" style="width: 100%; margin-top: 28px;" onclick="addToDirectory()">
          Add to Directory
        </button>
      </div>
    </section>

    <!-- Directory Section -->
    <section class="directory-section">
      <div class="directory-header">
        <h2 class="section-title">Directory</h2>
        <span class="agent-count" id="agentCount">0 agents</span>
      </div>

      <div class="directory-list" id="directoryList">
        <div class="empty-state">
          <img src="assets/icon.png" alt="" class="icon">
          <p>No agents registered yet.<br>Be the first to add one.</p>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>
        <a href="https://fairscale.xyz">fairscale.xyz</a> · 
        <a href="https://docs.fairscale.xyz">Docs</a> · 
        <a href="https://twitter.com/FairScaleHQ">Twitter</a>
      </p>
    </footer>
  </div>

  <script>
    const API_URL = 'https://fairscale-reputation-api-production.up.railway.app';
    
    // Local storage for directory
    let directory = JSON.parse(localStorage.getItem('fairscale_directory') || '[]');
    
    // Render directory on load
    renderDirectory();

    async function registerAgent() {
      const wallet = document.getElementById('walletInput').value.trim();
      const btn = document.getElementById('registerBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('errorMsg');
      const result = document.getElementById('resultCard');

      // Reset states
      error.classList.remove('show');
      result.classList.remove('show');

      if (!wallet) {
        showError('Please enter a wallet address');
        return;
      }

      // Validate wallet format (basic check)
      if (wallet.length < 32 || wallet.length > 44) {
        showError('Invalid wallet address format');
        return;
      }

      // Show loading
      btn.disabled = true;
      loading.classList.add('show');

      try {
        const response = await fetch(`${API_URL}/score?wallet=${encodeURIComponent(wallet)}`);
        const data = await response.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        // Store current data for adding to directory
        window.currentAgentData = data;

        // Render result
        renderResult(data);

      } catch (e) {
        showError('Failed to fetch reputation. Please try again.');
        console.error(e);
      } finally {
        btn.disabled = false;
        loading.classList.remove('show');
      }
    }

    function renderResult(data) {
      const result = document.getElementById('resultCard');

      // Name (from SAID or wallet)
      const name = data.said?.name || `Agent ${data.wallet.slice(0, 8)}...`;
      document.getElementById('resultName').textContent = name;
      document.getElementById('resultWallet').textContent = data.wallet;

      // Score
      document.getElementById('resultScore').textContent = data.fairscale_agent_score || 0;

      // Badges
      const badgesContainer = document.getElementById('resultBadges');
      badgesContainer.innerHTML = (data.badges || []).map(b => 
        `<span class="badge ${b.id}">${b.label}</span>`
      ).join('');

      // Trust scores
      const lending = data.trust?.lending || 0;
      const otc = data.trust?.otc || 0;
      
      const lendingEl = document.getElementById('trustLending');
      lendingEl.textContent = lending;
      lendingEl.className = 'value ' + getScoreClass(lending);

      const otcEl = document.getElementById('trustOtc');
      otcEl.textContent = otc;
      otcEl.className = 'value ' + getScoreClass(otc);

      // Features
      document.getElementById('featLongevity').textContent = data.features?.longevity || 0;
      document.getElementById('featExperience').textContent = data.features?.experience || 0;
      document.getElementById('featConviction').textContent = data.features?.conviction || 0;
      document.getElementById('featCapital').textContent = data.features?.capital || 0;

      result.classList.add('show');
    }

    function getScoreClass(score) {
      if (score >= 70) return 'high';
      if (score >= 40) return 'medium';
      return 'low';
    }

    function showError(msg) {
      const error = document.getElementById('errorMsg');
      error.textContent = msg;
      error.classList.add('show');
    }

    function addToDirectory() {
      const data = window.currentAgentData;
      if (!data) return;

      // Check if already exists
      const exists = directory.find(a => a.wallet === data.wallet);
      if (exists) {
        // Update existing
        Object.assign(exists, {
          name: data.said?.name || `Agent ${data.wallet.slice(0, 8)}...`,
          score: data.fairscale_agent_score,
          badges: data.badges,
          trust: data.trust,
          features: data.features,
          said: data.said,
          updatedAt: Date.now()
        });
      } else {
        // Add new
        directory.push({
          wallet: data.wallet,
          name: data.said?.name || `Agent ${data.wallet.slice(0, 8)}...`,
          score: data.fairscale_agent_score,
          badges: data.badges,
          trust: data.trust,
          features: data.features,
          said: data.said,
          addedAt: Date.now(),
          updatedAt: Date.now()
        });
      }

      // Sort by score
      directory.sort((a, b) => b.score - a.score);

      // Save
      localStorage.setItem('fairscale_directory', JSON.stringify(directory));

      // Render
      renderDirectory();

      // Clear input
      document.getElementById('walletInput').value = '';
      document.getElementById('resultCard').classList.remove('show');

      // Scroll to directory
      document.querySelector('.directory-section').scrollIntoView({ behavior: 'smooth' });
    }

    function renderDirectory() {
      const list = document.getElementById('directoryList');
      const count = document.getElementById('agentCount');

      count.textContent = `${directory.length} agent${directory.length !== 1 ? 's' : ''}`;

      if (directory.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <img src="assets/icon.png" alt="" class="icon">
            <p>No agents registered yet.<br>Be the first to add one.</p>
          </div>
        `;
        return;
      }

      list.innerHTML = directory.map((agent, i) => {
        const verifiedBadge = agent.badges?.find(b => b.id === 'said_verified');
        const shortWallet = `${agent.wallet.slice(0, 6)}...${agent.wallet.slice(-4)}`;
        
        return `
          <div class="directory-item" onclick="viewAgent('${agent.wallet}')">
            <div class="info">
              <span class="rank">${i + 1}</span>
              <div>
                <div class="name">${agent.name}</div>
                <div class="wallet">${shortWallet}</div>
                <div class="badges-mini">
                  ${verifiedBadge ? '<span class="badge-mini verified">Verified</span>' : ''}
                  ${agent.badges?.slice(0, 3).filter(b => b.id !== 'said_verified').map(b => 
                    `<span class="badge-mini">${b.label}</span>`
                  ).join('') || ''}
                </div>
              </div>
            </div>
            <div class="score">${agent.score}</div>
          </div>
        `;
      }).join('');
    }

    function viewAgent(wallet) {
      document.getElementById('walletInput').value = wallet;
      registerAgent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Enter key to submit
    document.getElementById('walletInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') registerAgent();
    });
  </script>
</body>
</html>
