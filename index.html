<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairScale — Agent Trust Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'Advercase'; src: url('assets/Advercase-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Advercase'; src: url('assets/Advercase-Bold.ttf') format('truetype'); font-weight: 700; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f0e8; --surface: #faf7f2; --card: #ffffff; --border: #e8e0d4;
      --primary: #1a1612; --accent: #3d7a62; --gold: #c8963a;
      --text: #2c2620; --muted: #8a8078; --dim: #b8b0a4;
      --green: #3d7a62; --blue: #4a68b8; --purple: #7a5aa0;
      --yellow: #c8963a; --red: #c44a3a; --orange: #c87a3a;
      --vgreen: #2d8a4a; --pink: #b86878;
      --shadow: 0 1px 3px rgba(26,22,18,0.06), 0 4px 12px rgba(26,22,18,0.04);
      --shadow-lg: 0 2px 8px rgba(26,22,18,0.08), 0 8px 24px rgba(26,22,18,0.06);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 14px 32px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 80; }
    .header img { height: 26px; }
    .header nav { display: flex; gap: 4px; }
    .header nav a { color: var(--muted); text-decoration: none; font-size: 0.8rem; padding: 6px 14px; border-radius: 8px; transition: 0.15s; }
    .header nav a:hover { color: var(--text); background: rgba(0,0,0,0.04); }

    /* ── LAYOUT ── */
    .main { display: flex; height: calc(100vh - 53px); }
    .directory-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── HERO ── */
    .hero { padding: 28px 32px 0; }
    .hero-title { font-family: 'Source Serif 4', serif; font-size: 1.7rem; font-weight: 700; color: var(--primary); }
    .hero-sub { font-size: 0.84rem; color: var(--muted); margin-top: 4px; }
    .hero-row { display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
    .hero-stat { font-size: 0.74rem; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; }
    .hero-stat strong { color: var(--text); font-weight: 600; }
    .lookup-btn { background: var(--accent); color: #fff; border: none; font-family: 'DM Sans'; font-size: 0.8rem; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.15s; }
    .lookup-btn:hover { background: #346b55; }

    /* ── FILTERS ── */
    .filter-bar { display: flex; gap: 8px; padding: 16px 32px; align-items: center; flex-wrap: wrap; }
    .filter-bar input { flex: 2; min-width: 200px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 0.84rem; color: var(--text); font-family: inherit; outline: none; box-shadow: var(--shadow); }
    .filter-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,122,98,0.1); }
    .filter-bar input::placeholder { color: var(--dim); }
    .filter-bar select { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; color: var(--text); font-family: inherit; cursor: pointer; outline: none; box-shadow: var(--shadow); min-width: 120px; }
    .agent-count { font-size: 0.76rem; color: var(--muted); margin-left: auto; }

    /* ── DIRECTORY ── */
    .dir-scroll { flex: 1; overflow-y: auto; padding: 0 32px 20px; }
    .dir-scroll::-webkit-scrollbar { width: 6px; }
    .dir-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 6px; }

    .agent-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; margin-top: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); }
    .agent-row:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .agent-row.active { border-color: var(--accent); background: #f0f8f4; }
    .agent-rank { font-family: 'Advercase'; color: var(--dim); width: 24px; font-size: 0.85rem; text-align: center; flex-shrink: 0; }
    .agent-rank.top1 { color: var(--gold); font-weight: 700; } .agent-rank.top2 { color: #8a8078; } .agent-rank.top3 { color: #b0845a; }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-weight: 600; font-size: 0.9rem; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-wallet { font-family: monospace; font-size: 0.6rem; color: var(--dim); margin-top: 2px; }
    .agent-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .atag { font-size: 0.55rem; padding: 2px 8px; border-radius: 6px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
    .atag.said { background: #e8f4ee; color: var(--accent); }
    .atag.erc8004 { background: #e8ecf8; color: var(--blue); }
    .atag.fs { background: #f5f0e8; color: var(--gold); }
    .atag.clawkey { background: #faf0e0; color: var(--gold); }
    .atag.rec { border-radius: 10px; padding: 2px 10px; }
    .atag.rec-gold { background: #faf0e0; color: #9a7420; }
    .atag.rec-green { background: #e8f4ee; color: var(--accent); }
    .atag.rec-yellow { background: #faf5e0; color: #8a7020; }
    .atag.rec-orange { background: #faf0e0; color: #a06020; }
    .atag.rec-red { background: #fae8e8; color: var(--red); }

    .agent-bars { display: flex; gap: 2px; align-items: flex-end; height: 24px; flex-shrink: 0; }
    .agent-bars .mini-bar { width: 5px; border-radius: 3px 3px 0 0; }
    .agent-score { font-family: 'Advercase'; font-size: 1.6rem; font-weight: 700; color: var(--primary); flex-shrink: 0; min-width: 42px; text-align: right; }

    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 14px; }
    .pg-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 8px; font-size: 0.78rem; cursor: pointer; font-family: inherit; box-shadow: var(--shadow); }
    .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
    .pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .pg-info { font-size: 0.78rem; color: var(--muted); }
    .empty { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 0.88rem; }

    /* ── PROFILE PANEL ── */
    .profile-panel { width: 0; overflow: hidden; background: var(--surface); border-left: 1px solid var(--border); transition: width 0.3s ease; flex-shrink: 0; display: flex; flex-direction: column; }
    .profile-panel.open { width: 540px; }
    .profile-scroll { flex: 1; overflow-y: auto; }
    .profile-scroll::-webkit-scrollbar { width: 6px; }
    .profile-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 6px; }

    .profile-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 22px 26px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 5; }
    .profile-close { background: none; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .profile-close:hover { color: var(--text); background: rgba(0,0,0,0.04); }
    .profile-name { font-family: 'Source Serif 4', serif; font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .profile-wallet { font-family: monospace; font-size: 0.62rem; color: var(--dim); margin-top: 3px; cursor: pointer; }
    .profile-wallet:hover { color: var(--muted); }
    .profile-desc { font-size: 0.8rem; color: var(--muted); margin-top: 8px; line-height: 1.55; }
    .profile-tags { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }

    /* Score */
    .score-section { padding: 24px 26px; background: linear-gradient(135deg, #1a1612, #2a2420); border-bottom: 1px solid var(--border); text-align: center; border-radius: 0; }
    .score-big { font-family: 'Advercase'; font-size: 3.5rem; font-weight: 700; color: #f5f0e8; line-height: 1; }
    .score-label { font-size: 0.65rem; color: #b8b0a4; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
    .score-badges { display: flex; justify-content: center; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .sbadge { font-size: 0.65rem; padding: 4px 14px; border-radius: 14px; font-weight: 600; }
    .sbadge.tier-gold { background: var(--gold); color: #fff; } .sbadge.tier-silver { background: #8a8078; color: #fff; } .sbadge.tier-bronze { background: #b0845a; color: #fff; }
    .sbadge.rec { border: 1.5px solid; }
    .sbadge.rec-gold { border-color: var(--gold); color: var(--gold); background: rgba(200,150,58,0.1); }
    .sbadge.rec-green { border-color: var(--accent); color: var(--accent); background: rgba(61,122,98,0.1); }
    .sbadge.rec-yellow { border-color: #8a7020; color: #8a7020; background: rgba(138,112,32,0.1); }
    .sbadge.rec-orange { border-color: var(--orange); color: var(--orange); background: rgba(200,122,58,0.08); }
    .sbadge.rec-red { border-color: var(--red); color: var(--red); background: rgba(196,74,58,0.08); }
    .sbadge.pct { background: rgba(61,122,98,0.12); color: #f5f0e8; border: 1px solid rgba(61,122,98,0.3); }

    /* Info grid */
    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 16px 26px; border-bottom: 1px solid var(--border); }
    .info-cell { background: var(--card); border-radius: 10px; padding: 12px 10px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .info-cell .ik { font-size: 0.52rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .info-cell .iv { font-family: 'Advercase'; font-size: 1rem; color: var(--primary); margin-top: 4px; }
    .info-cell.hl { border-color: var(--accent); background: #f0f8f4; }
    .info-cell.hl .iv { color: var(--accent); }

    /* Sections */
    .psection { padding: 18px 26px; border-bottom: 1px solid var(--border); }
    .psection-title { font-family: 'Advercase'; font-size: 0.74rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

    /* Flags */
    .flags-bar { display: flex; flex-wrap: wrap; gap: 5px; }
    .flag { font-size: 0.66rem; padding: 4px 12px; border-radius: 8px; background: #fae8e8; border: 1px solid #f0d0d0; color: var(--red); text-transform: capitalize; }

    /* Verification */
    .v-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .vpill { font-size: 0.66rem; padding: 5px 12px; border-radius: 8px; font-weight: 500; }
    .vpill.on { background: #e8f4ee; border: 1px solid #c8e8d8; color: var(--vgreen); }
    .vpill.off { background: #f8f6f2; border: 1px solid var(--border); color: var(--dim); text-decoration: line-through; }

    /* Trust pillars */
    .pillar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pillar { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; box-shadow: var(--shadow); }
    .pillar.inactive { opacity: 0.4; }
    .pillar-top { display: flex; justify-content: space-between; align-items: center; }
    .pillar .plbl { font-size: 0.64rem; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    .pillar .pweight { font-size: 0.56rem; color: var(--dim); }
    .pillar .pval { font-family: 'Advercase'; font-size: 1.3rem; font-weight: 700; color: var(--primary); }
    .pillar .ppct { font-size: 0.56rem; color: var(--accent); margin-left: 4px; }
    .pillar-bar { height: 4px; background: var(--border); border-radius: 4px; margin: 8px 0 6px; overflow: hidden; }
    .pillar-bar-fill { height: 100%; border-radius: 4px; }
    .pillar-desc { font-size: 0.64rem; color: var(--muted); line-height: 1.45; }
    .pb-reliability { background: linear-gradient(90deg, #3d7a62, #5aad8e); }
    .pb-track_record { background: linear-gradient(90deg, #4a68b8, #7088e8); }
    .pb-economic_stake { background: linear-gradient(90deg, #c8963a, #e0b85c); }
    .pb-ecosystem { background: linear-gradient(90deg, #7a5aa0, #ab7ed0); }
    .pb-verification { background: linear-gradient(90deg, #2d8a4a, #4abc6a); }
    .pb-social { background: linear-gradient(90deg, #b86878, #db7a90); }

    /* Socials */
    .social-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .slink { font-size: 0.72rem; padding: 5px 14px; border-radius: 8px; text-decoration: none; background: var(--card); border: 1px solid var(--border); color: var(--text); box-shadow: var(--shadow); transition: 0.15s; }
    .slink:hover { border-color: var(--accent); }
    .slink.tw { color: #1a8cd8; }

    /* Actions */
    .profile-actions { padding: 18px 26px; display: flex; gap: 8px; }
    .pact-btn { flex: 1; padding: 11px; border-radius: 10px; font-family: 'DM Sans'; font-size: 0.8rem; font-weight: 500; cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--card); color: var(--text); box-shadow: var(--shadow); transition: 0.15s; }
    .pact-btn:hover { border-color: var(--accent); }
    .pact-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,18,0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 460px; max-width: 92vw; box-shadow: var(--shadow-lg); }
    .modal-box h3 { font-family: 'Source Serif 4', serif; color: var(--primary); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .modal-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 16px; }
    .modal-input-row { display: flex; gap: 8px; }
    .modal-input-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: var(--text); font-family: monospace; outline: none; }
    .modal-input-row input:focus { border-color: var(--accent); }
    .modal-input-row input::placeholder { color: var(--dim); font-family: 'DM Sans'; }
    .modal-input-row button { background: var(--accent); border: none; color: #fff; padding: 0 22px; border-radius: 10px; font-family: 'DM Sans'; font-weight: 600; font-size: 0.84rem; cursor: pointer; }
    .modal-error { font-size: 0.78rem; color: var(--red); margin-top: 8px; display: none; }
    .modal-error.show { display: block; }
    .modal-loading { display: none; align-items: center; gap: 8px; margin-top: 10px; color: var(--muted); font-size: 0.82rem; }
    .modal-loading.show { display: flex; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) { .profile-panel.open { width: 100%; position: fixed; inset: 0; top: 53px; z-index: 90; } }
    @media (max-width: 600px) {
      .hero { padding: 20px 18px 0; } .filter-bar { padding: 12px 18px; } .dir-scroll { padding: 0 18px 16px; }
      .info-grid { grid-template-columns: repeat(2, 1fr); } .pillar-grid { grid-template-columns: 1fr; }
      .agent-bars { display: none; } .profile-panel.open { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/"><img src="assets/logo.png" alt="FairScale"></a>
    <nav>
      <a href="https://fairscale.xyz" target="_blank">Website</a>
      <a href="https://docs.fairscale.xyz" target="_blank">Docs</a>
      <a href="https://twitter.com/fairscalexyz" target="_blank">Twitter</a>
    </nav>
  </header>
  <div class="main">
    <div class="directory-panel">
      <div class="hero">
        <div class="hero-title">Agent Trust Directory</div>
        <div class="hero-sub">Solana agents ranked by on-chain behavior, verification, and reputation.</div>
        <div class="hero-row">
          <span class="hero-stat" id="heroStats">Loading...</span>
          <button class="lookup-btn" id="openLookup">🔍 Look up any wallet</button>
        </div>
      </div>
      <div class="filter-bar">
        <input type="text" id="dirSearch" placeholder="Search by name or wallet...">
        <select id="dirSource"><option value="">All Sources</option><option value="said">SAID</option><option value="8004">ERC-8004</option><option value="both">Both</option></select>
        <select id="dirSort"><option value="agent_fairscore">FairScore</option><option value="verification">Verification</option><option value="reliability">Reliability</option><option value="social">Social</option><option value="track_record">Track Record</option><option value="economic_stake">Eco. Stake</option><option value="ecosystem">Ecosystem</option></select>
        <select id="dirRec"><option value="">All Tiers</option><option value="highly_recommended">Highly Recommended</option><option value="recommended">Recommended</option><option value="acceptable">Acceptable</option><option value="caution">Caution</option></select>
        <span class="agent-count" id="dirCount"></span>
      </div>
      <div class="dir-scroll" id="dirScroll"><div class="empty">Loading directory...</div></div>
      <div class="pagination" id="dirPagination"></div>
    </div>
    <div class="profile-panel" id="profilePanel">
      <div class="profile-scroll" id="profileContent"><div class="empty" style="color:var(--dim);">Select an agent to view details</div></div>
    </div>
  </div>
  <div class="modal-overlay" id="lookupModal">
    <div class="modal-box">
      <h3>Look Up Any Wallet</h3>
      <p>Enter a Solana wallet address to see its trust score and full breakdown.</p>
      <div class="modal-input-row"><input type="text" id="lookupInput" placeholder="Wallet address..."><button id="lookupBtn">Score</button></div>
      <div class="modal-error" id="lookupError"></div>
      <div class="modal-loading" id="lookupLoading"><div class="spinner"></div><span>Scoring...</span></div>
    </div>
  </div>
  <script>
    const API = 'https://fairscale-reputation-api-production.up.railway.app';
    let dirPage = 1, activeWallet = null;

    document.getElementById('openLookup').onclick = () => document.getElementById('lookupModal').classList.add('show');
    document.getElementById('lookupModal').onclick = e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('show'); };
    document.getElementById('lookupBtn').onclick = doLookup;
    document.getElementById('lookupInput').onkeypress = e => e.key === 'Enter' && doLookup();

    async function doLookup() {
      const w = document.getElementById('lookupInput').value.trim();
      const err = document.getElementById('lookupError'), ld = document.getElementById('lookupLoading');
      err.classList.remove('show'); ld.classList.remove('show');
      if (!w || w.length < 32) { err.textContent = 'Enter a valid Solana wallet address'; err.classList.add('show'); return; }
      ld.classList.add('show');
      try {
        const r = await fetch(`${API}/score?wallet=${encodeURIComponent(w)}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        document.getElementById('lookupModal').classList.remove('show'); ld.classList.remove('show');
        renderProfile(d); document.getElementById('profilePanel').classList.add('open');
        activeWallet = w; document.querySelectorAll('.agent-row').forEach(el => el.classList.toggle('active', el.dataset.wallet === w));
      } catch (e) { err.textContent = e.message; err.classList.add('show'); ld.classList.remove('show'); }
    }

    let debounce = null;
    ['dirSearch','dirSource','dirSort','dirRec'].forEach(id => {
      const el = document.getElementById(id);
      el[id === 'dirSearch' ? 'oninput' : 'onchange'] = () => { dirPage = 1; clearTimeout(debounce); debounce = setTimeout(loadDir, 250); };
    });

    async function loadDir() {
      const search = document.getElementById('dirSearch').value.trim();
      const source = document.getElementById('dirSource').value;
      const sort = document.getElementById('dirSort').value;
      const rec = document.getElementById('dirRec').value;
      const params = new URLSearchParams({ page: dirPage, limit: 25, sort });
      if (search) params.set('search', search);
      if (source) params.set('source', source);
      if (rec) params.set('recommendation', rec);
      const scroll = document.getElementById('dirScroll');
      try {
        const r = await fetch(`${API}/directory?${params}`);
        const d = await r.json();
        document.getElementById('dirCount').textContent = `${d.total} agents`;
        if ((d.agents||[]).length) {
          scroll.innerHTML = d.agents.map(a => {
            const rc = a.recommendation?.color || '', rl = a.recommendation?.label || '';
            const tags = [
              ...(a.sources||[]).map(s => s==='said'?'<span class="atag said">SAID</span>':s==='erc8004'?'<span class="atag erc8004">8004</span>':s==='sati'?'<span class="atag erc8004">SATI</span>':s==='fairscale'?'<span class="atag fs">FS</span>':''),
              a.humanVerified?'<span class="atag clawkey">ClawKey ✓</span>':'',
              rl?`<span class="atag rec rec-${rc}">${rl}</span>`:'',
            ].filter(Boolean).join('');
            const f = a.features||{};
            const bars = [
              {v:f.verification||0,c:'#4abc6a'},{v:f.reliability||0,c:'#5aad8e'},
              {v:f.social||0,c:'#db7a90'},{v:f.track_record||0,c:'#7088e8'},
              {v:f.economic_stake||0,c:'#e0b85c'},{v:f.ecosystem||0,c:'#ab7ed0'},
            ].map(b=>`<div class="mini-bar" style="height:${Math.max(b.v*0.24,2)}px;background:${b.c};"></div>`).join('');
            const sub = sort!=='agent_fairscore'?`<div style="font-size:0.56rem;color:var(--dim);text-align:right;">${sort.replace(/_/g,' ')}: ${f[sort]||'—'}</div>`:'';
            return `<div class="agent-row${a.wallet===activeWallet?' active':''}" data-wallet="${a.wallet}" onclick="selectAgent('${a.wallet}')">
              <div class="agent-rank${a.rank<=3?' top'+a.rank:''}">${a.rank}</div>
              <div class="agent-info"><div class="agent-name">${a.name}</div><div class="agent-wallet">${a.wallet.slice(0,6)}...${a.wallet.slice(-4)}</div><div class="agent-tags">${tags}</div></div>
              <div class="agent-bars">${bars}</div>
              <div style="text-align:right;">${sub}<div class="agent-score">${a.agent_fairscore}</div></div>
            </div>`;
          }).join('');
        } else scroll.innerHTML = '<div class="empty">No agents match your filters</div>';
        const pag = document.getElementById('dirPagination');
        if (d.totalPages > 1) pag.innerHTML = `<button class="pg-btn" ${dirPage<=1?'disabled':''} onclick="dirPage--;loadDir()">← Prev</button><span class="pg-info">Page ${dirPage} of ${d.totalPages}</span><button class="pg-btn" ${dirPage>=d.totalPages?'disabled':''} onclick="dirPage++;loadDir()">Next →</button>`;
        else pag.innerHTML = '';
      } catch (e) { scroll.innerHTML = '<div class="empty">Failed to load directory</div>'; }
    }

    async function loadStats() {
      try {
        const r = await fetch(`${API}/stats`); const d = await r.json();
        document.getElementById('heroStats').innerHTML = `<strong>${d.agents||0}</strong> scored · <strong>${d.erc8004Agents||0}</strong> ERC-8004 · <strong>${d.saidAgents||0}</strong> SAID · <strong>${d.onBothProtocols||0}</strong> dual`;
      } catch(e) { document.getElementById('heroStats').textContent = ''; }
    }

    async function selectAgent(wallet) {
      activeWallet = wallet;
      document.querySelectorAll('.agent-row').forEach(el => el.classList.toggle('active', el.dataset.wallet === wallet));
      const panel = document.getElementById('profilePanel'), content = document.getElementById('profileContent');
      panel.classList.add('open');
      content.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
      try {
        const r = await fetch(`${API}/score?wallet=${encodeURIComponent(wallet)}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        renderProfile(d);
      } catch (e) { content.innerHTML = `<div class="empty">${e.message}</div>`; }
    }

    function renderProfile(d) {
      const s = d.agent_fairscore||0, tier = s>=70?'gold':s>=40?'silver':'bronze';
      const f = d.features||{}, desc = d.descriptions||{}, rec = d.recommendation;
      const bd = d.breakdown||{}, pct = d.percentiles||{}, flags = d.red_flags||[];
      const v = d.verifications||{}, socials = d.socials||{};
      const stags = [v.said_onchain||d.isSaidAgent?'<span class="atag said">SAID</span>':'',v.erc8004?'<span class="atag erc8004">ERC-8004</span>':'',v.sati?'<span class="atag erc8004">SATI</span>':'',d.isRegistered?'<span class="atag fs">FS</span>':'',v.clawkey?.verified?'<span class="atag clawkey">ClawKey ✓</span>':''].filter(Boolean).join('');
      const vPills = [{label:'SAID Protocol',on:v.said_onchain||d.isSaidAgent},{label:'ERC-8004',on:v.erc8004},{label:'SATI',on:v.sati},{label:'ClawKey',on:v.clawkey?.verified},{label:'Payment',on:d.isVerified},{label:'Registered',on:d.isRegistered}].map(p=>`<span class="vpill ${p.on?'on':'off'}">${p.on?'✓ ':''}${p.label}</span>`).join('');
      const pillars = [{key:'verification',label:'Verification',dw:25,color:'verification'},{key:'reliability',label:'Reliability',dw:25,color:'reliability'},{key:'social',label:'Social & Rep',dw:15,color:'social'},{key:'track_record',label:'Track Record',dw:15,color:'track_record'},{key:'economic_stake',label:'Eco. Stake',dw:10,color:'economic_stake'},{key:'ecosystem',label:'Ecosystem',dw:10,color:'ecosystem'}].map(p=>{
        const w=bd.weights_used?Math.round((bd.weights_used[p.key]||0)*100):p.dw, inactive=w===0, val=f[p.key]||0;
        return `<div class="pillar${inactive?' inactive':''}"><div class="pillar-top"><div><span class="plbl">${p.label}</span> <span class="pweight">${w}%</span></div><div><span class="pval">${val}</span>${pct[p.key]!=null?`<span class="ppct">top ${100-pct[p.key]}%</span>`:''}</div></div><div class="pillar-bar"><div class="pillar-bar-fill pb-${p.color}" style="width:${inactive?0:val}%"></div></div><div class="pillar-desc">${inactive?'No data — weight redistributed':(desc[p.key]||'')}</div></div>`;
      }).join('');
      const socialLinks = [socials.twitter?`<a class="slink tw" href="https://x.com/${socials.twitter.replace('@','')}" target="_blank">𝕏 ${socials.twitter}</a>`:'',socials.github?`<a class="slink" href="https://github.com/${socials.github}" target="_blank">GitHub</a>`:'',socials.telegram?`<a class="slink" href="https://t.me/${socials.telegram}" target="_blank">Telegram</a>`:''].filter(Boolean).join('');
      document.getElementById('profileContent').innerHTML = `
        <div class="profile-header"><div><div class="profile-name">${d.name||'Agent '+d.wallet.slice(0,8)+'...'}</div><div class="profile-wallet" onclick="navigator.clipboard.writeText('${d.wallet}')" title="Click to copy">${d.wallet}</div>${d.description?`<div class="profile-desc">${d.description}</div>`:''}<div class="profile-tags">${stags}</div></div><button class="profile-close" onclick="document.getElementById('profilePanel').classList.remove('open');activeWallet=null;document.querySelectorAll('.agent-row').forEach(e=>e.classList.remove('active'));">✕</button></div>
        <div class="score-section"><div class="score-big">${s}</div><div class="score-label">Agent FairScore</div><div class="score-badges"><span class="sbadge tier-${tier}">${tier}</span>${rec?`<span class="sbadge rec rec-${rec.color}">${rec.label}</span>`:''}${pct.agent_fairscore!=null?`<span class="sbadge pct">Top ${100-pct.agent_fairscore}%</span>`:''}</div></div>
        <div class="info-grid"><div class="info-cell hl"><div class="ik">FairScale Base</div><div class="iv">${d.fairscore_base||bd.fs_base_raw||'—'}</div></div><div class="info-cell"><div class="ik">Social</div><div class="iv">${d.social_score||bd.fs_social_raw||'—'}</div></div><div class="info-cell"><div class="ik">SAID</div><div class="iv">${d.said?.score??'—'}</div></div><div class="info-cell"><div class="ik">Attestations</div><div class="iv">${d.said?.feedbackCount||0}</div></div></div>
        ${flags.length?`<div class="psection"><div class="psection-title">⚠ Flags (${bd.red_flag_penalty||0}pt)</div><div class="flags-bar">${flags.map(fl=>`<span class="flag">${fl.replace(/_/g,' ')}</span>`).join('')}</div></div>`:''}
        <div class="psection"><div class="psection-title">Verification</div><div class="v-pills">${vPills}</div></div>
        <div class="psection"><div class="psection-title">Trust Pillars</div><div class="pillar-grid">${pillars}</div></div>
        ${d.attestation_graph?.attester_count>0?`<div class="psection"><div class="psection-title">Attestation Network</div><div style="display:flex;gap:12px;"><div class="info-cell" style="flex:1"><div class="ik">Attesters</div><div class="iv">${d.attestation_graph.attester_count}</div></div><div class="info-cell" style="flex:1"><div class="ik">Weighted</div><div class="iv">${d.attestation_graph.weighted_score}</div></div></div></div>`:''}
        ${d.score_trend?.snapshots>1?`<div class="psection"><div class="psection-title">Trend</div><div style="display:flex;gap:12px;align-items:center;font-size:0.8rem;"><span style="font-size:1.2rem;">${d.score_trend.trend==='rising'?'📈':d.score_trend.trend==='falling'?'📉':'➡️'}</span><span>${d.score_trend.trend}</span><span style="color:${d.score_trend.change>=0?'var(--accent)':'var(--red)'}">${d.score_trend.change>=0?'+':''}${d.score_trend.change}</span></div></div>`:''}
        ${socialLinks?`<div class="psection"><div class="psection-title">Socials</div><div class="social-row">${socialLinks}</div></div>`:''}
        <div class="profile-actions"><a class="pact-btn" href="https://solscan.io/account/${d.wallet}" target="_blank">Solscan</a>${d.website?`<a class="pact-btn" href="${d.website}" target="_blank">Website</a>`:''}${!d.isVerified?`<button class="pact-btn primary" onclick="alert('Coming soon')">Verify</button>`:''}</div>`;
    }

    loadDir(); loadStats();
  </script>
</body>
</html>
